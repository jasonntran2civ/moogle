version: v2
modules:
  - path: .
    name: buf.build/evidencelens/contracts
lint:
  use:
    - STANDARD
  except:
    # Spec section 3 deliberately omits the version suffix in package names
    # (uses `evidencelens.v1` not `evidencelens.v1beta1` etc).
    - PACKAGE_VERSION_SUFFIX
    # Spec section 3.1 enum values are bare (RCT, META_ANALYSIS, ...)
    # rather than ENUM-prefixed (STUDY_TYPE_RCT). Adopting the prefix
    # would break every downstream consumer; documented as an intentional
    # divergence from buf STANDARD.
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    # We name event payload messages without a "Request"/"Response" suffix
    # because they aren't RPC pairs; they're event topics.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
deps: []
