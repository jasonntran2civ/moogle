# Pre-commit hooks. Install: `pip install pre-commit && pre-commit install`.
# Spec section 16.3.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, css, html, markdown, yaml, json]
        exclude: '^(proto/gen/|.*\.lock$|infra/grafana/dashboards/.*\.json$)'

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy

  - repo: https://github.com/bufbuild/buf
    rev: v1.47.2
    hooks:
      - id: buf-format
      - id: buf-lint

  - repo: local
    hooks:
      - id: no-secrets
        name: forbid committed secrets
        entry: bash -c 'if git diff --cached -U0 | grep -E "(sk-[A-Za-z0-9]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|AIza[A-Za-z0-9_-]{20,})"; then echo "ABORT: secret-shaped string in diff"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [commit]
