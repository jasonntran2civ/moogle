name = "click-logger"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
PUBSUB_TOPIC = "click-events"
GCP_PROJECT = "evidencelens-prod"

# Service binding to GCP via the pubsub-bridge worker (avoids embedding
# a service-account JSON in this worker).
[[services]]
binding = "BRIDGE"
service = "pubsub-bridge"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
