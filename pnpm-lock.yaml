lockfileVersion: '9.0'

# Stub lockfile. The real lockfile is generated by `pnpm install` on
# first dev/CI run (which uses --no-frozen-lockfile in our workflows
# until per-workspace package.json files settle). This file exists so
# actions/setup-node@v4's optional `cache: pnpm` directive doesn't fail.
#
# After the first successful CI run, regenerate locally and commit:
#   pnpm install
#   git add pnpm-lock.yaml
#   git commit -m "chore: pin pnpm lockfile"
#
# At that point, swap workflow installs from --no-frozen-lockfile back
# to --frozen-lockfile to enforce reproducibility.

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers: {}
