# OpenTelemetry Collector — local dev.
#
# Receives OTLP from local services and prints to stdout. No external
# exporter -- developers can `docker logs el-otel` to see traces/metrics/logs.

receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch:
    timeout: 1s

exporters:
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 50

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:  { receivers: [otlp], processors: [batch], exporters: [debug] }
    metrics: { receivers: [otlp], processors: [batch], exporters: [debug] }
    logs:    { receivers: [otlp], processors: [batch], exporters: [debug] }
