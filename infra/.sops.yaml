# sops + age secrets policy.
#
# Replace `age1...` with your team's age public key (recipient).
# Generate with: age-keygen -o ~/.config/sops/age/keys.txt

creation_rules:
  - path_regex: infra/secrets/.*\.yaml$
    age: age1example_replace_with_real_recipient_public_key
  - path_regex: infra/secrets/.*\.json$
    age: age1example_replace_with_real_recipient_public_key
  - path_regex: terraform\.tfstate$
    age: age1example_replace_with_real_recipient_public_key
