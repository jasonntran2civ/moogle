# Spec section 14.1 SLO alerts.
groups:
  - name: evidencelens-slo
    interval: 1m
    rules:
      - alert: SearchAvailabilityBelow99_5
        expr: |
          sum(rate(http_server_request_duration_seconds_count{service="gateway",route=~"/api/search.*",status!~"5.."}[30m]))
          /
          sum(rate(http_server_request_duration_seconds_count{service="gateway",route=~"/api/search.*"}[30m]))
          < 0.995
        for: 10m
        labels: { severity: page, slo: search-availability }
        annotations:
          summary: "Search API availability below 99.5%"
          runbook: "docs/runbooks/search-availability.md"

      - alert: SearchLatencyP95Above800ms
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_request_duration_seconds_bucket{service="gateway",route=~"/api/search.*"}[5m])) by (le)
          ) > 0.8
        for: 10m
        labels: { severity: page, slo: search-latency }
        annotations:
          summary: "Search p95 > 800ms for 10 minutes"
          runbook: "docs/runbooks/search-latency.md"

      - alert: IndexerLagAbove5Min
        expr: indexer_lag_seconds > 300
        for: 10m
        labels: { severity: page, slo: indexer-lag }
        annotations:
          summary: "Indexer lag exceeds 5 minute SLO"
          runbook: "docs/runbooks/indexer-lag.md"

      - alert: RecallFanoutAbove1Min
        expr: |
          histogram_quantile(0.95, sum(rate(recall_fanout_seconds_bucket[5m])) by (le)) > 60
        for: 5m
        labels: { severity: page, slo: recall-fanout }
        annotations:
          summary: "Recall fanout p95 > 1 minute"
          runbook: "docs/runbooks/recall-fanout-broken.md"

      - alert: IndexerDLQGrowing
        expr: rate(indexer_dlq_total[5m]) > 0.1
        for: 15m
        labels: { severity: warn }
        annotations:
          summary: "Indexer dead-lettering > 0.1 msg/sec sustained"
          runbook: "docs/runbooks/indexer-dlq.md"

      - alert: BYOKProxyErrorSpike
        expr: |
          sum(rate(byok_proxy_errors_total[5m])) / sum(rate(byok_proxy_requests_total[5m])) > 0.05
        for: 10m
        labels: { severity: warn }
        annotations:
          summary: "BYOK proxy error rate > 5%"
          runbook: "docs/runbooks/llm-proxy-error-spike.md"

      - alert: IngesterStuck
        expr: |
          (time() - ingestion_state_last_run_timestamp_seconds) > on(source) (24 * 3600 * ingestion_state_expected_period_days)
        for: 1h
        labels: { severity: warn }
        annotations:
          summary: "Ingester {{ $labels.source }} hasn't run in expected period"
          runbook: "docs/runbooks/ingester-stuck.md"
