global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: evidencelens-nas
    environment: production

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metricsz

  - job_name: meilisearch
    static_configs:
      - targets: ["meilisearch:7700"]
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
