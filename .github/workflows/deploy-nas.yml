name: Trigger NAS Dokploy redeploy

on:
  push:
    branches: [main]
    paths:
      - "process/**"
      - "embedder/**"
      - "scorer/**"
      - "indexer/**"
      - "gateway/**"
      - "agent/**"
      - "mcp-server/**"
      - ".github/workflows/deploy-nas.yml"
  workflow_dispatch:

jobs:
  webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy webhook
        env:
          URL:   ${{ secrets.DOKPLOY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
        run: |
          if [ -z "$URL" ]; then
            echo "::warning::DOKPLOY_WEBHOOK_URL not set; skipping NAS redeploy. See BLOCKERS.md."
            exit 0
          fi
          curl -fsSL -X POST "$URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"sha": "${{ github.sha }}", "ref": "${{ github.ref_name }}"}'
