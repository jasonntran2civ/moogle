name: Nightly interleaving evaluator

on:
  schedule:
    - cron: "47 5 * * *"  # 05:47 UTC nightly
  workflow_dispatch:
    inputs:
      candidate:
        description: "Candidate variant to compare against control"
        default: "vector_heavy"

jobs:
  interleaving:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install google-cloud-bigquery
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - name: Run interleaving t-test
        run: |
          python eval/interleaving.py \
            --variant control \
            --candidate ${{ github.event.inputs.candidate || 'vector_heavy' }} \
            --days 7 | tee /tmp/interleaving.json
      - name: Post summary
        if: always()
        run: cat /tmp/interleaving.json | tee -a $GITHUB_STEP_SUMMARY
