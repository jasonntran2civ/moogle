name: Deploy Cloud Run ingesters

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/deploy-cloud-run.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    strategy:
      fail-fast: false
      matrix:
        ingester:
          - pubmed
          - preprint
          - trials
          - ictrp
          - fda
          - openalex
          - crossref
          - unpaywall
          - nih-reporter
          - open-payments
          - cochrane
          - guidelines
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:latest \
            -f ingest/cmd/ingester-${{ matrix.ingester }}/Dockerfile ingest/
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }} --all-tags
      - name: Deploy
        run: |
          gcloud run deploy ingester-${{ matrix.ingester }} \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:${{ github.sha }} \
            --region us-central1 \
            --no-allow-unauthenticated \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 900s
