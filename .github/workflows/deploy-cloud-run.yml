name: Deploy Cloud Run ingesters

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.GCP_WIF_PROVIDER }}" ] && [ -n "${{ secrets.GCP_DEPLOY_SA }}" ] && [ -n "${{ secrets.GCP_PROJECT }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP secrets not configured; skipping Cloud Run deploy. See BLOCKERS.md."
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    strategy:
      fail-fast: false
      matrix:
        ingester:
          - pubmed
          - preprint
          - trials
          - ictrp
          - fda
          - openalex
          - crossref
          - unpaywall
          - nih-reporter
          - open-payments
          - cochrane
          - guidelines
          - core
          - chembl
          - omim
          - hpo
          - disgenet
          - cdc-wonder
          - ema
          - mhra
          - health-canada
          - tga
          - pmda
          - nsf
          - drugbank
          - pmc-oa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          # No cache: directive on purpose. The Go module dependencies
          # are downloaded fresh per matrix job; with 26 ingesters and
          # one go.mod, the cache would thrash. Once go.sum is committed
          # and stable, re-add `cache-dependency-path: ingest/go.sum`.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:latest \
            -f ingest/cmd/ingester-${{ matrix.ingester }}/Dockerfile ingest/
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }} --all-tags
      - name: Deploy
        run: |
          gcloud run deploy ingester-${{ matrix.ingester }} \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/evidencelens/ingester-${{ matrix.ingester }}:${{ github.sha }} \
            --region us-central1 \
            --no-allow-unauthenticated \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 900s
